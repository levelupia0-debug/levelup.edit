<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire Karl</title>
    <!-- Chargement de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chargement de React et Babel pour le JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0.05; }
            100% { transform: translateY(-30px) scale(1.1); opacity: 0.2; }
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); transform: scale(1); }
            70% { box-shadow: 0 0 40px 20px rgba(255, 255, 255, 0); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); transform: scale(1); }
        }
        .animate-pulse-glow {
            animation: pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes letterReveal {
            0% { transform: translateY(30px); opacity: 0; filter: blur(10px); }
            100% { transform: translateY(0); opacity: 1; filter: blur(0); }
        }
        .animate-letter-reveal {
            animation: letterReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.95); filter: blur(5px); }
            20% { opacity: 1; transform: scale(1); filter: blur(0); }
            80% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.05); filter: blur(5px); }
        }
        .animate-fade-in-out {
            animation: fadeInOut 2s ease-in-out forwards;
        }
        @keyframes shakeLetter {
            0%, 100% { transform: translateX(0) rotate(0deg) scale(1.1); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px) rotate(-4deg) scale(1.1); }
            20%, 40%, 60%, 80% { transform: translateX(4px) rotate(4deg) scale(1.1); }
        }
        .animate-shake-letter {
            animation: shakeLetter 0.5s ease-in-out infinite;
        }
        @keyframes blinkRedWhite {
            0%, 100% { color: #ffffff; fill: #ffffff; filter: drop-shadow(0 0 8px rgba(255,255,255,0.8)); }
            50% { color: #ef4444; fill: #ef4444; filter: drop-shadow(0 0 12px rgba(239,68,68,0.8)); }
        }
        .animate-blink-heart {
            animation: blinkRedWhite 1.5s ease-in-out infinite;
        }
        @keyframes swayFlower {
            0%, 100% { transform: rotate(-10deg) scale(1); filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
            50% { transform: rotate(10deg) scale(1.1); filter: drop-shadow(0 0 20px rgba(255,255,255,0.6)); }
        }
        .animate-sway-flower {
            animation: swayFlower 4s ease-in-out infinite;
        }
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Composant Icône (Correction pour Lucide CDN)
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const kebabName = name
                        .replace(/([a-z0-9])([A-Z])/g, '$1-$2')
                        .toLowerCase();
                    
                    iconRef.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                    
                    window.lucide.createIcons({
                        attrs: {
                            width: size,
                            height: size,
                            class: className,
                            'stroke-width': strokeWidth
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className, strokeWidth]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const FloatingParticles = () => {
            const [particles, setParticles] = useState([]);
            useEffect(() => {
                const newParticles = Array.from({ length: 15 }).map((_, i) => ({
                    id: i,
                    x: Math.random() * 100,
                    y: Math.random() * 100,
                    size: Math.random() * 4 + 2,
                    animationDuration: Math.random() * 5 + 4,
                    delay: Math.random() * 2,
                }));
                setParticles(newParticles);
            }, []);

            return (
                <div className="fixed inset-0 pointer-events-none overflow-hidden">
                    {particles.map((p) => (
                        <div
                            key={p.id}
                            className="absolute bg-white rounded-full"
                            style={{
                                left: `${p.x}%`,
                                top: `${p.y}%`,
                                width: `${p.size}px`,
                                height: `${p.size}px`,
                                animation: `float ${p.animationDuration}s ease-in-out infinite alternate`,
                                animationDelay: `${p.delay}s`,
                            }}
                        />
                    ))}
                </div>
            );
        };

        const PremiumFireworks = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                
                const resizeCanvas = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();

                const particles = [];
                const colors = ['#ffffff', '#f8fafc', '#e2e8f0', '#cbd5e1'];

                class Particle {
                    constructor(x, y) {
                        this.x = x;
                        this.y = y;
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 5 + 1;
                        this.velocity = {
                            x: Math.cos(angle) * speed,
                            y: Math.sin(angle) * speed
                        };
                        this.life = 100;
                        this.opacity = 1;
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                        this.size = Math.random() * 2.5 + 0.5;
                    }
                    draw() {
                        ctx.globalAlpha = this.opacity;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.fill();
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = this.color;
                    }
                    update() {
                        this.velocity.y += 0.04;
                        this.x += this.velocity.x;
                        this.y += this.velocity.y;
                        this.life -= 1.2;
                        this.opacity = Math.max(0, this.life / 100);
                        this.draw();
                    }
                }

                const createFirework = () => {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * (canvas.height / 2);
                    for (let i = 0; i < 50; i++) {
                        particles.push(new Particle(x, y));
                    }
                };

                const launchInterval = setInterval(createFirework, 600);
                createFirework();

                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (let i = particles.length - 1; i >= 0; i--) {
                        particles[i].update();
                        if (particles[i].life <= 0) {
                            particles.splice(i, 1);
                        }
                    }
                    animationFrameId = requestAnimationFrame(animate);
                };
                animate();

                return () => {
                    window.removeEventListener('resize', resizeCanvas);
                    clearInterval(launchInterval);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-0 opacity-50 mix-blend-screen" />;
        };

        function App() {
            const [step, setStep] = useState(0);

            useEffect(() => {
                if (step === 0) {
                    const timer = setTimeout(() => setStep(1), 2000);
                    return () => clearTimeout(timer);
                }
            }, [step]);

            const handleOpenGift = () => {
                setStep(2);
                setTimeout(() => setStep(3), 3000);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-900 via-black to-gray-800 flex items-center justify-center p-4 font-sans text-gray-200 relative selection:bg-gray-700 selection:text-white overflow-hidden">
                    <FloatingParticles />

                    <div className="max-w-xl w-full relative z-10">
                        {step === 0 && (
                            <div className="fixed inset-0 bg-black z-50 flex items-center justify-center">
                                <h1 className="text-4xl md:text-6xl font-light text-white tracking-[0.3em] uppercase animate-fade-in-out">
                                    LevelUp
                                </h1>
                            </div>
                        )}

                        {step === 1 && (
                            <div className="bg-gray-900/60 backdrop-blur-xl p-10 rounded-2xl shadow-[0_0_50px_rgba(255,255,255,0.05)] border border-gray-700/50 text-center animate-pop-in">
                                <div className="flex justify-center mb-8">
                                    <div className="bg-gray-800/80 p-5 rounded-full text-white shadow-[0_0_30px_rgba(255,255,255,0.1)] border border-gray-600 relative">
                                        <div className="absolute inset-0 bg-white/10 rounded-full animate-ping opacity-30 duration-1000"></div>
                                        <Icon name="Flower2" className="animate-sway-flower text-white relative z-10" size={42} strokeWidth={1.5} />
                                    </div>
                                </div>
                                <h1 className="text-xl md:text-2xl font-light text-gray-400 mb-2 uppercase tracking-widest">Joyeux Anniversaire</h1>
                                <h2 className="text-5xl md:text-6xl font-bold text-white mb-10 tracking-tight">KARL</h2>
                                <p className="text-gray-400 mb-10 text-lg font-light">Une petite attention pour un vrai frère...</p>
                                <button
                                    onClick={handleOpenGift}
                                    className="group relative inline-flex items-center justify-center px-10 py-4 font-medium text-black bg-white rounded-full overflow-hidden transition-all hover:bg-gray-200 hover:scale-105 hover:shadow-[0_0_30px_rgba(255,255,255,0.3)] active:scale-95 duration-300"
                                >
                                    <span className="relative flex items-center gap-3 text-lg">
                                        <Icon name="Gift" className="group-hover:scale-110 transition-transform duration-300" size={22} strokeWidth={2} />
                                        Ouvrir le message
                                    </span>
                                </button>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="flex flex-col items-center justify-center h-64 animate-letter-reveal">
                                <div className="relative">
                                    <div className="absolute inset-0 bg-white blur-[80px] opacity-20 rounded-full"></div>
                                    <div className="relative bg-gray-900 p-8 rounded-full border border-gray-500 animate-shake-letter shadow-[0_0_50px_rgba(255,255,255,0.2)]">
                                        <Icon name="Mail" size={50} className="text-white" strokeWidth={1.5} />
                                    </div>
                                </div>
                                <p className="mt-12 text-sm font-medium text-white tracking-[0.3em] uppercase animate-pulse drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">
                                    Ouverture de la lettre...
                                </p>
                            </div>
                        )}

                        {step === 3 && (
                            <>
                                <PremiumFireworks />
                                <div className="bg-gray-900/50 backdrop-blur-3xl p-8 md:p-14 rounded-3xl shadow-[0_0_80px_rgba(255,255,255,0.08)] border border-gray-600/50 animate-letter-reveal text-left relative overflow-hidden z-10">
                                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-px bg-gradient-to-r from-transparent via-white to-transparent opacity-60"></div>
                                    <h2 className="text-3xl font-light text-white mb-10 pb-6 border-b border-gray-700/80 tracking-wide drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">
                                        Salut Karl,
                                    </h2>
                                    <div className="space-y-7 text-lg text-gray-300 font-light leading-relaxed">
                                        <p>Aujourd'hui c ton jour ! J'voulais absolument marquer le coup parce que t'es vraiment une personne exceptionnelle.</p>
                                        <p>Dire qu'on s'est connus sur HelloTalk... À l'époque, j'ne pensais pas faire une rencontre aussi cool en ligne. Aujourd'hui, je te considère sincèrement comme un grand frère. T'es vraiment un gars en or, toujours droit et honnête.</p>
                                        <p className="text-gray-400">J'sais que j'fais souvent des fautes meme si j m'en fou pas mal (d'ailleurs, pardonne celles qui se sont sûrement glissées ici ! 😅), et j'sais à quel point tu aimes me corriger. Même si ta manière de le faire m'énerve parfois ( mbaye ndiaye 😏) il faut bien l'avouer au fond, ça me fait plaisir, car c'est aussi grâce à ça que je m'améliore.</p>
                                        <p>Reste exactement comme t'es bro. Une personne cool, intelligente et sur qui on peut toujours compter. Ce petit site n'est pas grand-chose, mais c'est ma façon à moi de te souhaiter le meilleur pour cette nouvelle année.</p>
                                    </div>
                                    <div className="mt-14 pt-8 flex flex-col items-center justify-center text-center relative z-10">
                                        <Icon name="Heart" className="animate-blink-heart mb-6" size={32} strokeWidth={1.5} />
                                        <p className="text-xl font-light text-white tracking-widest uppercase mb-3 drop-shadow-[0_0_10px_rgba(255,255,255,0.4)]">Joyeux Anniversaire mon frère</p>
                                        <p className="text-sm text-gray-400 font-serif italic">— LevelUp bro</p>
                                    </div>
                                    <div className="mt-12 flex justify-center relative z-10">
                                        <button onClick={() => setStep(1)} className="text-xs text-gray-400 hover:text-white transition-colors flex items-center gap-2 uppercase tracking-[0.2em] hover:drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]">
                                            Fermer la lettre
                                        </button>
                                    </div>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
