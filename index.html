<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level IA - Maintenance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animation de rotation fluide pour l'étoile */
        @keyframes rotate-360 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-star {
            animation: rotate-360 8s linear infinite;
            display: inline-block;
        }

        .star-purple {
            color: #a78bfa; 
            filter: drop-shadow(0 0 25px rgba(139, 92, 246, 0.8));
        }

        /* Transitions fluides pour le changement de langue */
        .fade-text {
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
        }
        
        .hidden-text {
            opacity: 0;
            transform: translateY(15px);
        }

        /* Effet de lueur sur le bouton */
        .btn-glow {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }
        .btn-glow:hover {
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.7);
            transform: translateY(-2px);
            background-color: #7c3aed;
        }

        /* Background sombre profond */
        body {
            background-color: #030303;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white font-sans overflow-hidden">

    <!-- Effet de halo lumineux en arrière-plan -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-violet-900/15 via-transparent to-transparent"></div>

    <div class="text-center p-6 md:p-12 relative z-10 w-full max-w-4xl">
        
        <!-- Étoile de développement tournante -->
        <div class="mb-14">
            <svg class="animate-star star-purple w-36 h-36 mx-auto" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.787 1.4 8.168L12 18.896l-7.334 3.869 1.4-8.168-5.934-5.787 8.2-1.192L12 .587z"/>
            </svg>
        </div>

        <!-- Conteneur de texte avec changement automatique -->
        <div id="text-container" class="fade-text">
            <h1 id="title" class="text-5xl md:text-7xl font-black mb-8 tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">
                Revenez plus tard
            </h1>
            
            <div id="content" class="text-gray-400 text-xl md:text-2xl mx-auto space-y-6 leading-relaxed font-light">
                <p>
                    <span class="text-violet-400 font-bold">Level IA</span> est actuellement en cours de développement. 
                    Nous préparons quelque chose d'exceptionnel pour vous.
                </p>
                <p class="text-gray-500 italic text-lg">
                    Vous serez notifié une fois que la mise à jour sera prête.
                </p>
            </div>
        </div>

        <!-- Section Action / Bouton -->
        <div class="mt-14">
            <p class="text-sm text-gray-500 mb-5 uppercase tracking-widest font-medium">Accès Prioritaire</p>
            <a href="https://levelupia0-debug.github.io/levelupia/" 
               target="_blank"
               class="btn-glow inline-block bg-violet-600 text-white font-bold py-5 px-12 rounded-2xl text-lg transition-all border border-violet-400/20">
                Obtenir votre clé d'accès
            </a>
        </div>

        <!-- Indicateur de statut (3 points) -->
        <div class="mt-24 flex justify-center space-x-5">
            <div class="w-2.5 h-2.5 rounded-full bg-violet-900 animate-pulse"></div>
            <div class="w-2.5 h-2.5 rounded-full bg-violet-600 animate-pulse" style="animation-delay: 0.3s"></div>
            <div class="w-2.5 h-2.5 rounded-full bg-violet-400 animate-pulse" style="animation-delay: 0.6s"></div>
        </div>
    </div>

    <script>
        // Données pour le basculement linguistique
        const translations = [
            {
                title: "Revenez plus tard",
                body: `
                    <p><span class="text-violet-400 font-bold">Level IA</span> est actuellement en cours de développement.</p>
                    <p>Nous préparons quelque chose d'exceptionnel pour vous.</p>
                    <p class="text-gray-500 italic text-lg">Vous serez notifié une fois que la mise à jour sera prête.</p>
                `
            },
            {
                title: "Come back later",
                body: `
                    <p><span class="text-violet-400 font-bold">Level IA</span> is currently under development.</p>
                    <p>We are preparing something exceptional for you.</p>
                    <p class="text-gray-500 italic text-lg">You will be notified once the update is ready.</p>
                `
            }
        ];

        let currentIndex = 0;
        const container = document.getElementById('text-container');
        const titleElem = document.getElementById('title');
        const contentElem = document.getElementById('content');

        function switchLanguage() {
            // Animation de sortie
            container.classList.add('hidden-text');
            
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % translations.length;
                const data = translations[currentIndex];
                
                titleElem.textContent = data.title;
                contentElem.innerHTML = data.body;
                
                // Animation d'entrée
                container.classList.remove('hidden-text');
            }, 800); 
        }

        // Intervalle de 10 secondes (10000ms)
        setInterval(switchLanguage, 10000);
    </script>

</body>
</html>
